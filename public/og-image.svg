<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b" />
      <stop offset="1" stop-color="#18181b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#a5b4fc" />
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="25%" r="60%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35" />
      <stop offset="1" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <g transform="translate(90, 250)">
    <rect x="0" y="-70" width="64" height="64" rx="14" fill="#6366f1" />
    <text x="32" y="-38" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, serif" font-size="30" font-weight="600" fill="#ffffff">MR</text>
    <text x="0" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="600" fill="url(#accent)">Matheus</text>
    <text x="0" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="600" fill="url(#accent)">Nascimento</text>
  </g>
</svg>
